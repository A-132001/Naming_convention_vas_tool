{% extends "base.html" %}

{% block title %}Delete User | Naming Convention{% endblock %}

{% block content %}
<div class="mx-auto max-w-2xl">
  <div class="mb-6 rounded-2xl border border-violet-100 bg-white/80 p-6 shadow-sm backdrop-blur">
    <div class="text-xs font-semibold uppercase tracking-wider text-violet-700">Admin</div>
    <h1 class="mt-2 text-2xl font-bold text-slate-900">Delete User</h1>
    <p class="mt-2 text-sm text-slate-600">This action cannot be undone.</p>
  </div>

  <div class="rounded-2xl border border-rose-200 bg-rose-50 p-6 shadow-sm">
    <div class="text-sm font-semibold text-rose-800">User: {{ object.username }}</div>
    <div class="mt-2 text-sm text-rose-700">
      Are you sure you want to delete this user account?
    </div>

    <form method="post" class="mt-5 space-y-3">
      {% csrf_token %}
      <div class="flex flex-col gap-3 sm:flex-row">
        <a href="{% url 'admin_users_list' %}"
           class="w-full rounded-xl border border-violet-200 bg-white px-4 py-3 text-sm font-semibold text-violet-700 shadow-sm transition duration-200 hover:border-violet-300 hover:bg-violet-50 sm:w-auto text-center">
          Cancel
        </a>
        <button type="submit"
          class="w-full rounded-xl border border-rose-300 bg-rose-100 px-4 py-3 text-sm font-semibold text-rose-800 shadow-sm transition duration-200 hover:bg-rose-200 sm:w-auto">
          Delete
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
